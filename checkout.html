<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>

<script src="https://js.stripe.com/v3/"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter, Arial, sans-serif;
}

body {
  background: #f7f8fa;
  color: #111;
}

.container {
  width: 90%;
  max-width: 900px;
  margin: 80px auto;
}

.title {
  font-size: 42px;
  font-weight: 800;
  margin-bottom: 20px;
  text-align: center;
}

.subtitle {
  text-align: center;
  color: #666;
  margin-bottom: 50px;
  font-size: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(260px,1fr));
  gap: 24px;
}

.card {
  background: white;
  border-radius: 18px;
  padding: 30px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.04);
  text-align: center;
}

.plan {
  font-size: 24px;
  font-weight: 700;
}

.price {
  font-size: 46px;
  font-weight: 800;
  margin: 20px 0;
}

.desc {
  color: #666;
  margin-bottom: 30px;
}

.btn {
  background: #111;
  color: white;
  border: none;
  padding: 14px 26px;
  border-radius: 12px;
  cursor: pointer;
  font-size: 15px;
  width: 100%;
}

.btn:hover {
  opacity: 0.92;
}
</style>
</head>
<body>

<div class="container">

  <div class="title">
    Choose Your Plan
  </div>

  <div class="subtitle">
    Start increasing conversions today
  </div>

  <div class="grid">

    <div class="card">
      <div class="plan">Starter</div>
      <div class="price">$99/mo</div>
      <div class="desc">
        Perfect for small businesses
      </div>
      <button class="btn" onclick="startCheckout('starter')">
        Start Starter
      </button>
    </div>

    <div class="card">
      <div class="plan">Growth</div>
      <div class="price">$299/mo</div>
      <div class="desc">
        For scaling marketplaces
      </div>
      <button class="btn" onclick="startCheckout('growth')">
        Start Growth
      </button>
    </div>

    <div class="card">
      <div class="plan">Enterprise</div>
      <div class="price">Custom</div>
      <div class="desc">
        White-label AI infrastructure
      </div>
      <button class="btn" onclick="alert('Contact Sales')">
        Contact Sales
      </button>
    </div>

  </div>

</div>

<script>
const stripe = Stripe("pk_test_51TPRaoJxAAO1xgvBQ18Z9EqyjD2wuKQLGxJiYLmMqzkDXChGBv2Z8cTEFJZAg6sjVRvLrAYTwH6ptVroQMAjPZYA00165cL8Li");

async function startCheckout(plan) {
  try {
    const response = await fetch(
      "https://ai-widget-backend-iy7x.onrender.com/create-checkout-session",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          plan: plan
        })
      }
    );

    const data = await response.json();

    if (data.url) {
      window.location.href = data.url;
    } else {
      alert("Payment error");
    }

  } catch (error) {
    console.error(error);
    alert("Checkout failed");
  }
}
</script>

</body>
</html>
